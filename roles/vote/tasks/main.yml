---
- name: Checkout loomio-deploy repo
  ansible.builtin.git:
    repo: https://github.com/loomio/loomio-deploy.git
    version: "{{ loomio_version }}"
    dest: ??

- name: Copy loomio config
  ansible.builtin.template:
    src: env.j2
    dest: /etc/freifunk/.env
    mode: "0640"
    owner: root
    group: root
  notify: Run docker-compose
